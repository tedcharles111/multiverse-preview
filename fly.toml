app = "multiverse-preview-api"
primary_region = "ams"

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  PUBLIC_URL = "https://multiverse-preview-api.fly.dev"

[http_service]
  internal_port = 3000    # ✅ change from 8080 to 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
